<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="manifest" href="/golf-agent/manifest.json" />

    <!-- Viewport & Basic -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="description" content="Track your golf rounds with GPS distance measurement and detailed statistics" />

    <!-- PWA & Mobile -->
    <meta name="theme-color" content="#2196F3" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Golf Scorecard" />
    <link rel="apple-touch-icon" href="/golf-agent/golf-icon.jpg" />

    <!-- Title -->
    <title>Red Tail Golf Scorecard</title>
    <script type="module" crossorigin src="/golf-agent/assets/index-BRlV2aPN.js"></script>
    <link rel="stylesheet" crossorigin href="/golf-agent/assets/index-DNNSIUyQ.css">
  </head>
  <body>
    <div id="root"></div>

    <!-- Register Service Worker -->
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('/golf-agent/service-worker.js')
            .then(registration => {
              console.log('Service Worker registered:', registration);
            })
            .catch(error => {
              console.log('Service Worker registration failed:', error);
            });
        });
      }
    </script>
  </body>
</html>
